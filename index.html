<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>Liero Web</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="assets/icons/icon-192.png">
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="rotate-msg"></div>
    <canvas id="game"></canvas>
    <script type="module" src="js/main.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js', { scope: './' }).catch(function(){});
        }
        // Lock orientation - works in PWA fullscreen mode
        function lockLandscape() {
            try {
                if (screen.orientation && screen.orientation.lock) {
                    screen.orientation.lock('landscape').catch(function(){});
                }
            } catch(e) {}
        }
        lockLandscape();
        document.addEventListener('fullscreenchange', lockLandscape);
        document.addEventListener('webkitfullscreenchange', lockLandscape);
        // Prevent any scrolling/bouncing
        document.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });
        document.addEventListener('scroll', function(e) { window.scrollTo(0,0); });
        window.addEventListener('resize', function() { window.scrollTo(0,0); });
    </script>
</body>
</html>
